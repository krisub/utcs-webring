name: verify and add member
on:
  issues:
    types: [opened]

jobs:
  verify-and-add:
    if: contains(github.event.issue.labels.*.name, 'add-me')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/join-webring.yml

      - name: run verification
        id: verify
        env:
          EDU_EMAIL: ${{ fromJson(steps.parse.outputs.jsonString).edu_email }}
          MEMBER_URL: ${{ fromJson(steps.parse.outputs.jsonString).website_url }}
        run: |
          NORMALIZED_URL="$(python3 - <<'PY'
          from urllib.parse import urlsplit, urlunsplit
          import os
          import sys

          raw = os.environ["MEMBER_URL"].strip()
          parts = urlsplit(raw)

          if parts.scheme not in {"http", "https"} or not parts.netloc or parts.username or parts.password:
              sys.exit(1)

          host = (parts.hostname or "").lower()
          port = parts.port
          default_port = (parts.scheme == "http" and port == 80) or (parts.scheme == "https" and port == 443)
          netloc = host if port is None or default_port else f"{host}:{port}"
          path = parts.path or "/"
          if path != "/":
              path = path.rstrip("/")
              if not path:
                  path = "/"

          print(urlunsplit((parts.scheme.lower(), netloc, path, "", "")))
          PY
          )"

          if [[ -n "$EDU_EMAIL" && "$EDU_EMAIL" =~ ^[A-Za-z0-9._%+-]+@([A-Za-z0-9-]+\.)*edu$ && -n "$NORMALIZED_URL" ]]; then
            echo "status=verified" >> "$GITHUB_OUTPUT"
            echo "member_url=$NORMALIZED_URL" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: update members.json
        if: steps.verify.outputs.status == 'verified'
        env:
          MEMBER_URL: ${{ steps.verify.outputs.member_url }}
          GH_TOKEN: ${{ secrets.ADMIN_GH_TOKEN }}
        run: |
          jq "if index(\"$MEMBER_URL\") then . else . + [\"$MEMBER_URL\"] end" members.json > temp.json && mv temp.json members.json

          git config --global user.name "webring bot"
          git config --global user.email "bot@github.com"
          git add members.json
          git commit -m "added $MEMBER_URL to the webring!"
          git push

          gh issue delete ${{ github.event.issue.number }} --yes

      - name: failure
        if: steps.verify.outputs.status != 'verified'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "could not verify this request automatically. please make sure you used a valid http(s) website URL and a .edu email. @krisub can still take a look manually!"
