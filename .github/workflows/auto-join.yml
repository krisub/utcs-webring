name: verify and add member
on:
  issues:
    types: [opened]

jobs:
  verify-and-add:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/join-webring.yml

      - name: run verification
        id: verify
        env:
          UT_EMAIL: ${{ fromJson(steps.parse.outputs.jsonString).ut_email }}
        run: |
          if [[ -n "$UT_EMAIL" && "$UT_EMAIL" =~ ^[A-Za-z0-9._%+-]+@utexas\.edu$ ]]; then
            echo "status=verified" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: update members.json
        if: steps.verify.outputs.status == 'verified'
        env:
          MEMBER_URL: ${{ fromJson(steps.parse.outputs.jsonString).website_url }}
          GH_TOKEN: ${{ secrets.ADMIN_GH_TOKEN }}
        run: |
          jq ". += [\"$MEMBER_URL\"] | unique" members.json > temp.json && mv temp.json members.json

          git config --global user.name "webring bot"
          git config --global user.email "bot@github.com"
          git add members.json
          git commit -m "added $MEMBER_URL to the webring!"
          git push
          
          gh issue delete ${{ github.event.issue.number }} --yes

      - name: failure
        if: steps.verify.outputs.status != 'verified'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "could not verify that this is a valid @utexas.edu email automatically. @krisub will take a look manually!"
