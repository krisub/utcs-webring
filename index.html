<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>utcs webring!</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #DEDEDE;
            color: black;
            margin: 20px;
            line-height: 1.6;
            font-size: 1em;
        }
        @media (min-width: 768px) {
            body { max-width: 50vw; }
        }
        h2 { font-weight: bold; font-size: 1.2em; }
        a { color: black; text-decoration: underline; }

        ul {
            list-style-type: none;
            padding-left: 0;
        }
        li::before {
            content: "- ";
            padding-right: 5px;
        }
    </style>
</head>
<body>

    <h2>utcs webring!</h2>
    <p>current members: </p>

    <ul id="member-list">
        </ul>

    <div style="text-align: left; margin: 30px 0;">
        <a href="https://utcs-webring.krisub.workers.dev/prev?from=https://krisub.github.io/utcs-webring/">←</a> |
        <a href="https://krisub.github.io/utcs-webring/"><strong>utcs</strong></a>
        (<a href="https://utcs-webring.krisub.workers.dev/random?from=https://krisub.github.io/utcs-webring/"><strong>random</strong></a>) |
        <a href="https://utcs-webring.krisub.workers.dev/next?from=https://krisub.github.io/utcs-webring/">→</a>
    </div>

    <script>
      fetch('members.json')
        .then(response => response.json())
        .then(members => {
          const list = document.getElementById('member-list');
          members.forEach(url => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
            list.appendChild(li);
          });
        })
        .catch(error => console.error('error loading members list :( ', error));
    </script>

</body>
</html>
